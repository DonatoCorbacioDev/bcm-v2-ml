version: 2
updates:
  # pip dependencies (requirements.txt, requirements-dev.txt) — weekly PRs
  # for outdated/vulnerable packages. Security updates are opened
  # immediately regardless of this schedule.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # xgboost has no build available for Python 3.11 (this project's
      # runtime, see Dockerfile) past 3.2.0 — confirmed by actually
      # installing inside a python:3.11-slim container, not inferred.
      # Revisit once this project bumps its own Python version.
      - dependency-name: "xgboost"
        versions: [">=3.3.0"]

  # GitHub Actions used in the workflows under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Base image in Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Confirmed 3.14 fails: numpy==1.26.4 has no prebuilt wheel for it and
      # python:3.14-slim has no C compiler to build it from source (see the
      # comment on the FROM line in Dockerfile). Only 3.14 was tested — not
      # blocking 3.12/3.13, which may well be fine; narrow this if a bump to
      # one of those specifically gets proposed and verified.
      - dependency-name: "python"
        versions: [">=3.14"]
